<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#2563eb"/>
  <!-- Right pill (sits behind) -->
  <rect x="13" y="11" width="16" height="10" rx="5" fill="none" stroke="white" stroke-width="2.5"/>
  <!-- Cover strip to create interlock illusion -->
  <rect x="13.5" y="12.8" width="5" height="6.4" fill="#2563eb"/>
  <!-- Left pill (sits in front) -->
  <rect x="3" y="11" width="16" height="10" rx="5" fill="none" stroke="white" stroke-width="2.5"/>
</svg>
